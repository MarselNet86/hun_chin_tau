{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}AniVerse — смотри аниме{% endblock %}</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700;900&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #e8002d;
      --red-glow: rgba(232, 0, 45, 0.4);
      --dark: #070709;
      --panel: rgba(12, 12, 18, 0.92);
      --border: rgba(255,255,255,0.07);
      --text-muted: rgba(255,255,255,0.45);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      overflow-x: hidden;
    }
    h1, h2, h3, .font-display { font-family: 'Unbounded', sans-serif; }
    #three-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .content { position: relative; z-index: 1; }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 32px;
      background: linear-gradient(to bottom, rgba(7,7,9,0.95) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .logo {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 40%, var(--red));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-link {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: color 0.2s;
      letter-spacing: 0.3px;
      text-decoration: none;
    }
    .nav-link:hover, .nav-link.active { color: #fff; }
    .nav-link.active {
      background: rgba(255,255,255,0.1);
      padding: 5px 14px;
      border-radius: 20px;
    }
    .nav-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-icon:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      align-items: flex-end;
      padding-bottom: 80px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 60% 40%, rgba(180,10,30,0.18) 0%, transparent 70%),
                  linear-gradient(to bottom, transparent 40%, var(--dark) 100%);
    }
    .hero-image {
      position: absolute;
      inset: 0;
      background: url('https://i.imgur.com/tCF58S3.jpg') center/cover no-repeat;
      filter: brightness(0.35) saturate(1.2);
    }
    .hero-content {
      position: relative;
      padding: 0 60px;
      max-width: 560px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--red);
      color: #fff;
      font-family: 'Unbounded', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 3px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .hero-title {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -1.5px;
      margin-bottom: 14px;
      text-shadow: 0 0 60px rgba(232,0,45,0.3);
    }
    .hero-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }
    .hero-meta .rating {
      color: #4ade80;
      font-weight: 600;
      font-family: 'Unbounded', sans-serif;
    }
    .hero-description {
      font-size: 14px;
      line-height: 1.65;
      color: rgba(255,255,255,0.65);
      margin-bottom: 28px;
      max-width: 420px;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      color: #000;
      font-family: 'Unbounded', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      letter-spacing: 0.3px;
    }
    .btn-primary:hover { background: rgba(255,255,255,0.88); transform: translateY(-1px); }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-family: 'Unbounded', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.15);
      letter-spacing: 0.3px;
      backdrop-filter: blur(8px);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.18); transform: translateY(-1px); }
    .section {
      padding: 48px 60px;
    }
    .section-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: '';
      width: 3px; height: 18px;
      background: var(--red);
      border-radius: 2px;
      box-shadow: 0 0 10px var(--red-glow);
      display: block;
    }
    .cards-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }
    .card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 3/4;
      background: #111;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid var(--border);
    }
    .card:hover {
      transform: scale(1.04) translateY(-4px);
      border-color: rgba(255,255,255,0.2);
      z-index: 10;
    }
    .card:hover .card-overlay { opacity: 1; }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.85);
      transition: filter 0.3s;
    }
    .card:hover img { filter: brightness(1); }
    .card-badge {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: 'Unbounded', sans-serif;
      font-size: 10px;
      font-weight: 600;
      color: #4ade80;
    }
    .card-4k {
      position: absolute;
      top: 8px; right: 8px;
      background: var(--red);
      border-radius: 3px;
      padding: 2px 5px;
      font-family: 'Unbounded', sans-serif;
      font-size: 9px;
      font-weight: 700;
    }
    .card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%);
    }
    .card-title {
      font-size: 11px;
      font-weight: 500;
      line-height: 1.3;
      color: rgba(255,255,255,0.9);
    }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(232,0,45,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .play-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(232,0,45,0.4);
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(16px);
      z-index: 200;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding-top: 60px;
    }
    .modal-backdrop.active {
      display: flex;
    }
    .modal {
      width: 90%;
      max-width: 900px;
      border-radius: 12px;
      overflow: hidden;
      background: #0d0d12;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 40px 120px rgba(0,0,0,0.8), 0 0 80px rgba(232,0,45,0.08);
      animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalIn {
      from { transform: scale(0.9) translateY(30px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    .modal-hero {
      position: relative;
      height: 260px;
    }
    .modal-hero img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.4);
    }
    .modal-hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(13,13,18,0.9) 0%, transparent 60%),
                  linear-gradient(to top, rgba(13,13,18,1) 0%, transparent 40%);
    }
    .modal-hero-content {
      position: absolute;
      bottom: 0; left: 0;
      padding: 24px 28px;
    }
    .modal-tabs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .modal-tab {
      padding: 14px 28px;
      font-size: 13px;
      font-family: 'Unbounded', sans-serif;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .modal-tab.active { color: #fff; border-bottom-color: var(--red); }
    .modal-body { padding: 24px 28px; }
    .modal-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.8);
      z-index: 10;
    }
    .modal-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .genre-tag {
      display: inline-block;
      padding: 3px 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 11px;
      color: var(--text-muted);
      margin: 0 4px 4px 0;
    }
    .search-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      z-index: 300;
      display: none;
      flex-direction: column;
      align-items: center;
      padding-top: 120px;
    }
    .search-overlay.active {
      display: flex;
    }
    .search-input-wrap {
      width: 90%;
      max-width: 600px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 16px 20px 16px 52px;
      font-family: 'Unbounded', sans-serif;
      font-size: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: rgba(255,255,255,0.5); }
    .search-input::placeholder { color: rgba(255,255,255,0.25); }
    .search-icon-left {
      position: absolute;
      left: 18px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    .snow-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .flake {
      position: absolute;
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      animation: fall linear infinite;
      user-select: none;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<canvas id="three-canvas"></canvas>
<div class="snow-overlay" id="snow"></div>
{% block content %}{% endblock %}
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="animeModal">
    <div class="modal-hero">
      <img id="modalImg" src="" alt=""/>
      <div class="modal-hero-gradient"></div>
      <div class="modal-hero-content">
        <div id="modalTitle" style="font-family:'Unbounded',sans-serif; font-size:22px; font-weight:800; margin-bottom:8px;"></div>
        <div style="display:flex; gap:10px; align-items:center; font-size:13px;">
          <span id="modalRating" style="color:#4ade80; font-family:'Unbounded',sans-serif; font-weight:700;"></span>
          <span id="modalYear" style="color:var(--text-muted);"></span>
          <div id="modalGenres"></div>
        </div>
      </div>
      <div class="modal-close" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
    <div class="modal-tabs">
      <div class="modal-tab active">О сериале</div>
      <div class="modal-tab">Сезоны и серии</div>
    </div>
    <div class="modal-body">
      <p id="modalDesc" style="font-size:14px; color:rgba(255,255,255,0.65); line-height:1.7; margin-bottom:24px;"></p>
      <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn-primary" id="modalWatchBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Смотреть
        </button>
      </div>
    </div>
  </div>
</div>
<div class="search-overlay" id="searchOverlay">
  <div class="search-input-wrap">
    <div class="search-icon-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
    <input class="search-input" type="text" placeholder="Поиск аниме..." id="searchInput"/>
  </div>
  <div style="margin-top:32px; font-size:13px; color:var(--text-muted);">Нажмите Esc чтобы закрыть</div>
</div>
{% block scripts %}{% endblock %}
<script>
  (function() {
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.z = 400;
    const count = 800;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 2000;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 2000;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 800;
      const isRed = Math.random() < 0.12;
      if (isRed) {
        colors[i * 3] = 0.9;
        colors[i * 3 + 1] = 0.0;
        colors[i * 3 + 2] = 0.15;
      } else {
        const b = 0.3 + Math.random() * 0.5;
        colors[i * 3] = b;
        colors[i * 3 + 1] = b;
        colors[i * 3 + 2] = b + 0.1;
      }
      sizes[i] = Math.random() * 2.5 + 0.5;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    const material = new THREE.PointsMaterial({
      size: 1.8,
      vertexColors: true,
      transparent: true,
      opacity: 0.55,
      sizeAttenuation: true,
    });
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.0004;
      particles.rotation.y = t * 0.12;
      particles.rotation.x = t * 0.04;
      const pos = geometry.attributes.position.array;
      for (let i = 1; i < count * 3; i += 3) {
        pos[i] -= 0.08;
        if (pos[i] < -1000) pos[i] = 1000;
      }
      geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    }
    animate();
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  })();
  (function() {
    const snow = document.getElementById('snow');
    const flakes = ['❄', '❅', '❆', '*'];
    for (let i = 0; i < 28; i++) {
      const f = document.createElement('div');
      f.className = 'flake';
      f.textContent = flakes[Math.floor(Math.random() * flakes.length)];
      f.style.left = Math.random() * 100 + 'vw';
      f.style.top = Math.random() * 100 + 'vh';
      f.style.fontSize = (8 + Math.random() * 10) + 'px';
      f.style.animationDuration = (8 + Math.random() * 18) + 's';
      f.style.animationDelay = (Math.random() * 12) + 's';
      f.style.opacity = 0.2 + Math.random() * 0.4;
      snow.appendChild(f);
    }
  })();
  function openModal(anime) {
    document.getElementById('modalImg').src = anime.img;
    document.getElementById('modalTitle').textContent = anime.title;
    document.getElementById('modalRating').textContent = anime.rating;
    document.getElementById('modalYear').textContent = anime.year;
    document.getElementById('modalDesc').textContent = anime.desc;
    const genresContainer = document.getElementById('modalGenres');
    genresContainer.innerHTML = anime.genres.map(g => '<span class="genre-tag">' + g + '</span>').join('');
    document.getElementById('modalWatchBtn').onclick = function() {
      window.location.href = '/player/' + anime.id + '/';
    };
    document.getElementById('modalBackdrop').classList.add('active');
  }
  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('active');
  }
  document.getElementById('modalBackdrop').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  const searchBtn = document.getElementById('searchBtn');
  const searchOverlay = document.getElementById('searchOverlay');
  const searchInput = document.getElementById('searchInput');
  if (searchBtn) {
    searchBtn.addEventListener('click', function() {
      searchOverlay.classList.add('active');
      searchInput.focus();
    });
  }
  searchOverlay.addEventListener('click', function(e) {
    if (e.target === this) {
      searchOverlay.classList.remove('active');
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      searchOverlay.classList.remove('active');
      closeModal();
    }
  });
</script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}HunChinTau — смотри аниме{% endblock %}</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700;900&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'anime/css/base.css' %}"/>
  {% block extra_css %}{% endblock %}
</head>
<body>
<canvas id="three-canvas"></canvas>
<div class="snow-overlay" id="snow"></div>
{% block content %}{% endblock %}

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="animeModal">
    <div class="modal-hero">
      <img id="modalImg" src="" alt=""/>
      <div class="modal-hero-gradient"></div>
      <div class="modal-hero-content">
        <div id="modalTitle" style="font-family:'Unbounded',sans-serif; font-size:22px; font-weight:800; margin-bottom:8px;"></div>
        <div style="display:flex; gap:10px; align-items:center; font-size:13px;">
          <span id="modalRating" style="color:#4ade80; font-family:'Unbounded',sans-serif; font-weight:700;"></span>
          <span id="modalYear" style="color:var(--text-muted);"></span>
          <div id="modalGenres"></div>
        </div>
      </div>
      <div class="modal-close" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
    <div class="modal-tabs">
      <div class="modal-tab active">О сериале</div>
      <div class="modal-tab">Сезоны и серии</div>
    </div>
    <div class="modal-body">
      <p id="modalDesc" style="font-size:14px; color:rgba(255,255,255,0.65); line-height:1.7; margin-bottom:24px;"></p>
      <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn-primary" id="modalWatchBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Смотреть
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Search Overlay -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-input-wrap">
    <div class="search-icon-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
    <input class="search-input" type="text" placeholder="Поиск аниме..." id="searchInput"/>
  </div>
  <div class="search-results" id="searchResults"></div>
  <div style="margin-top:32px; font-size:13px; color:var(--text-muted);">Нажмите Esc чтобы закрыть</div>
</div>

{% block scripts %}{% endblock %}
<script src="{% static 'anime/js/base.js' %}"></script>
</body>
</html>

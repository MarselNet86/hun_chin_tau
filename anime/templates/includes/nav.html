<!-- Navigation Bar -->
<nav>
  <div class="logo">AniVerse</div>
  <a href="{% url 'anime:index' %}" class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">Для вас</a>
  <a href="{% url 'catalog:catalog' %}" class="nav-link">Каталог</a>
  <a href="#" class="nav-link">Библиотека</a>
  
  <div class="ml-auto flex items-center gap-2">
    {% if user.is_authenticated %}
      <div class="nav-icon" title="Уведомления">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <div class="nav-icon" style="background: rgba(255,255,255,0.1); color:#fff; font-family:'Unbounded',sans-serif; font-size:11px; font-weight:700;">
        {{ user.username|slice:":2"|upper }}
      </div>
    {% else %}
      <a href="{% url 'users:login' %}" class="nav-link">Войти</a>
    {% endif %}
    
    <div class="nav-icon" id="searchBtn" title="Поиск">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
    </div>
  </div>
</nav>
